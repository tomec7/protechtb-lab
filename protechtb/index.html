<!doctype html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>protechtb — IT systémy, ktoré fungujú</title>
  <meta name="description" content="protechtb: navrhujeme a dodávame PC, Home Assistant, NAS a smart IT riešenia pre domácnosti aj firmy." />
  <style>
    :root {
      --bg:#07080b; --bg-soft:#0f1219; --card:rgba(255,255,255,.045); --line:rgba(255,255,255,.14);
      --text:#f4f6fa; --muted:#adb4c4; --gold:#d9b66c; --gold2:#af7e2a;
      --ok:#8fd6a9; --max:1180px; --r:18px;
      --glow1:rgba(217,182,108,.16); --glow2:rgba(97,122,201,.11);
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{
      font-family:"Segoe UI","SF Pro Text",system-ui,sans-serif;color:var(--text);line-height:1.62;
      background:radial-gradient(900px 440px at 90% -10%,var(--glow1),transparent 58%),radial-gradient(900px 500px at -8% 6%,var(--glow2),transparent 55%),var(--bg);
    }
    body.light{
      --bg:#f4f7fc; --bg-soft:#fff; --card:rgba(17,24,39,.04); --line:rgba(17,24,39,.18);
      --text:#151c2b; --muted:#56627b; --gold:#b6852f; --gold2:#8b6625;
      --glow1:rgba(182,133,47,.15); --glow2:rgba(86,116,206,.10);
    }
    .container{max-width:var(--max);margin:0 auto;padding:0 20px}

    header{position:sticky;top:0;z-index:40;background:color-mix(in oklab,var(--bg) 86%, transparent);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
    .nav{min-height:72px;display:flex;align-items:center;justify-content:space-between}
    .left{display:flex;align-items:center;gap:14px}
    .brand{font-weight:800;letter-spacing:.08em;text-transform:lowercase}.brand span{color:var(--gold)}

    .burger{width:42px;height:42px;border:1px solid var(--line);border-radius:10px;display:grid;place-items:center;cursor:pointer;background:var(--bg-soft)}
    .burger i,.burger i:before,.burger i:after{content:"";display:block;width:18px;height:2px;background:var(--text);position:relative}
    .burger i:before{position:absolute;top:-6px}.burger i:after{position:absolute;top:6px}

    .controls{display:flex;gap:10px;align-items:center}
    .seg{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--bg-soft)}
    .seg button{border:0;background:transparent;color:var(--muted);padding:8px 12px;font-weight:700;cursor:pointer}
    .seg button.active{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#151108}

    .drawer{position:fixed;left:-330px;top:0;bottom:0;width:310px;background:linear-gradient(180deg,color-mix(in oklab,var(--bg-soft) 95%,#111),color-mix(in oklab,var(--bg) 96%,#111));border-right:1px solid var(--line);z-index:60;transition:.25s;padding:18px}
    .drawer.open{left:0}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;z-index:55;transition:.2s}
    .overlay.show{opacity:1;pointer-events:all}
    .drawer h4{margin:6px 10px 12px;color:var(--gold);font-size:.84rem;letter-spacing:.06em;text-transform:uppercase}
    .drawer a{display:block;padding:12px 10px;border-radius:12px;color:var(--text);text-decoration:none;border:1px solid transparent;margin-bottom:8px}
    .drawer a:hover,.drawer a.active{border-color:var(--line);background:rgba(255,255,255,.03)}

    .view{display:none;padding:58px 0}.view.active{display:block}
    .tag{display:inline-block;border:1px solid rgba(217,182,108,.35);border-radius:999px;padding:6px 12px;color:var(--gold);background:rgba(217,182,108,.09);font-size:.82rem;letter-spacing:.04em}
    h1{margin:16px 0 14px;line-height:1.06;font-size:clamp(2rem,5vw,3.7rem);letter-spacing:-.02em;max-width:960px}
    h2{margin:0 0 10px;font-size:clamp(1.45rem,2.8vw,2.3rem);letter-spacing:-.01em}
    .lead,.sub{color:var(--muted)} .lead{max-width:860px;font-size:clamp(1rem,1.8vw,1.16rem)}

    .cta{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}
    .btn{padding:12px 16px;border-radius:12px;border:1px solid var(--line);text-decoration:none;color:var(--text);font-weight:600;cursor:pointer;background:transparent}
    .btn.primary{border:0;background:linear-gradient(180deg,#edcf8f,#be9142);color:#171109;font-weight:800}

    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:22px}
    .card{border:1px solid var(--line);border-radius:var(--r);padding:20px;background:var(--card)}
    .card p{margin:0 0 10px;color:var(--muted)}
    .meta{border-top:1px dashed rgba(255,255,255,.16);padding-top:10px;color:#d3d9e8;font-size:.95rem}

    .gallery-grid{display:grid;gap:14px;margin-top:20px}
    details.project{border:1px solid var(--line);border-radius:14px;background:var(--card);overflow:hidden}
    details.project summary{list-style:none;cursor:pointer;padding:16px 18px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
    details.project summary::-webkit-details-marker{display:none}
    .project-body{padding:0 18px 16px}
    .project-body .sub{margin:2px 0 12px}
    .pics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .pics img{width:100%;height:190px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}
    .triplet{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}
    .mini{background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:12px;padding:12px}
    .mini b{color:var(--gold);display:block;margin-bottom:6px}
    .next-step{margin-top:10px;padding:10px 12px;border-radius:10px;background:rgba(143,214,169,.12);border:1px solid rgba(143,214,169,.35);color:var(--ok)}

    .case-list{display:grid;gap:12px;margin-top:18px}
    .case{border:1px solid var(--line);border-radius:14px;padding:14px;background:var(--card)}
    .case b{color:var(--gold)}

    footer{border-top:1px solid var(--line);padding:24px 0 36px;color:#8f98ac;font-size:.92rem}

    @media (max-width:980px){.grid2,.triplet,.pics{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <aside class="drawer" id="drawer">
    <h4 data-sk="Menu" data-en="Menu">Menu</h4>
    <a href="#home" data-route="home">Hlavná stránka</a>
    <a href="#services" data-route="services">Služby</a>
    <a href="#gallery" data-route="gallery">Galéria</a>
    <a href="#cases" data-route="cases">Realizácie</a>
    <a href="#contact" data-route="contact">Kontakt</a>
  </aside>
  <div class="overlay" id="overlay"></div>

  <header>
    <div class="container nav">
      <div class="left">
        <button class="burger" id="burger" aria-label="menu"><i></i></button>
        <div class="brand">pro<span>techtb</span></div>
      </div>
      <div class="controls">
        <div class="seg" aria-label="theme">
          <button id="darkBtn">🌙</button>
          <button id="lightBtn">☀️</button>
        </div>
        <div class="seg" aria-label="language">
          <button id="skBtn">SK</button>
          <button id="enBtn">EN</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="view" id="view-home">
      <div class="tag" data-i18n="tag"></div>
      <h1 data-i18n="heroTitle"></h1>
      <p class="lead" data-i18n="heroLead"></p>
      <div class="cta">
        <a class="btn primary" href="#services" data-i18n="ctaServices"></a>
        <a class="btn" href="#gallery" data-i18n="ctaGallery"></a>
      </div>
    </section>

    <section class="view" id="view-services">
      <h2 data-i18n="servicesTitle"></h2>
      <p class="sub" data-i18n="servicesLead"></p>
      <div class="grid2">
        <article class="card"><h3>PC Build & Performance</h3><p data-i18n="svc1p"></p><div class="meta" data-i18n="svc1m"></div></article>
        <article class="card"><h3>Home Assistant & Smart Home</h3><p data-i18n="svc2p"></p><div class="meta" data-i18n="svc2m"></div></article>
        <article class="card"><h3>NAS & Backup Reliability</h3><p data-i18n="svc3p"></p><div class="meta" data-i18n="svc3m"></div></article>
        <article class="card"><h3>IT Care & Integrations</h3><p data-i18n="svc4p"></p><div class="meta" data-i18n="svc4m"></div></article>
      </div>
    </section>

    <section class="view" id="view-gallery">
      <h2 data-i18n="galleryTitle"></h2>
      <p class="sub" data-i18n="galleryLead"></p>

      <div class="gallery-grid">
        <details class="project" open>
          <summary><span data-i18n="p1title"></span><span>▾</span></summary>
          <div class="project-body">
            <p class="sub" data-i18n="p1sub"></p>
            <div class="pics">
              <img src="https://images.pexels.com/photos/704730/pexels-photo-704730.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="PC build" />
              <img src="https://images.pexels.com/photos/356056/pexels-photo-356056.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="Workstation" />
              <img src="https://images.pexels.com/photos/1779487/pexels-photo-1779487.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="Cable management" />
            </div>
            <div class="triplet">
              <div class="mini"><b data-i18n="want"></b><span data-i18n="p1want"></span></div>
              <div class="mini"><b data-i18n="solution"></b><span data-i18n="p1solution"></span></div>
              <div class="mini"><b data-i18n="impact"></b><span data-i18n="p1impact"></span></div>
            </div>
            <div class="next-step" data-i18n="p1next"></div>
          </div>
        </details>

        <details class="project">
          <summary><span data-i18n="p2title"></span><span>▾</span></summary>
          <div class="project-body">
            <p class="sub" data-i18n="p2sub"></p>
            <div class="pics">
              <img src="https://images.unsplash.com/photo-1558002038-1055907df827?auto=format&fit=crop&w=1200&q=80" alt="Home Assistant dashboard" />
              <img src="https://images.pexels.com/photos/442576/pexels-photo-442576.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="Smart home sensors" />
              <img src="https://images.pexels.com/photos/356036/pexels-photo-356036.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="Automation setup" />
            </div>
            <div class="triplet">
              <div class="mini"><b data-i18n="want"></b><span data-i18n="p2want"></span></div>
              <div class="mini"><b data-i18n="solution"></b><span data-i18n="p2solution"></span></div>
              <div class="mini"><b data-i18n="impact"></b><span data-i18n="p2impact"></span></div>
            </div>
            <div class="next-step" data-i18n="p2next"></div>
          </div>
        </details>

        <details class="project">
          <summary><span data-i18n="p3title"></span><span>▾</span></summary>
          <div class="project-body">
            <p class="sub" data-i18n="p3sub"></p>
            <div class="pics">
              <img src="https://images.pexels.com/photos/325229/pexels-photo-325229.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="Server rack" />
              <img src="https://images.unsplash.com/photo-1597852074816-d933c7d2b988?auto=format&fit=crop&w=1200&q=80" alt="NAS" />
              <img src="https://images.pexels.com/photos/270404/pexels-photo-270404.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="Datacenter" />
            </div>
            <div class="triplet">
              <div class="mini"><b data-i18n="want"></b><span data-i18n="p3want"></span></div>
              <div class="mini"><b data-i18n="solution"></b><span data-i18n="p3solution"></span></div>
              <div class="mini"><b data-i18n="impact"></b><span data-i18n="p3impact"></span></div>
            </div>
            <div class="next-step" data-i18n="p3next"></div>
          </div>
        </details>
      </div>
    </section>

    <section class="view" id="view-cases">
      <h2 data-i18n="casesTitle"></h2>
      <div class="case-list">
        <article class="case"><b data-i18n="c1t"></b><p data-i18n="c1"></p></article>
        <article class="case"><b data-i18n="c2t"></b><p data-i18n="c2"></p></article>
        <article class="case"><b data-i18n="c3t"></b><p data-i18n="c3"></p></article>
      </div>
    </section>

    <section class="view" id="view-contact">
      <h2 data-i18n="contactTitle"></h2>
      <p class="sub" data-i18n="contactLead"></p>
    </section>
  </main>

  <footer>
    <div class="container">© 2026 protechtb</div>
  </footer>

  <script>
    const i18n = {
      sk: {
        menu:['Hlavná stránka','Služby','Galéria','Realizácie','Kontakt'],
        tag:'LUXURY DARK • SMART IT SYSTEMS',
        heroTitle:'Navrhujeme a dodávame IT systémy, ktoré fungujú dlhodobo.',
        heroLead:'Sme partner pre výkon, automatizáciu a stabilitu: PC, Home Assistant, NAS a dlhodobá IT starostlivosť.',
        ctaServices:'Naše služby', ctaGallery:'Prejsť do galérie',
        servicesTitle:'Podpisové služby', servicesLead:'Ponúkame jasný model: čo klient potrebuje → čo navrhneme → aký výsledok doručíme.',
        svc1p:'Navrhujeme, skladáme a optimalizujeme PC/workstation pre office, gaming aj creator workflow.', svc1m:'Výsledok: tichý, stabilný a výkonný systém s plánom ďalších upgradov.',
        svc2p:'Implementujeme Home Assistant, integrácie a automatizácie pre komfort a kontrolu domácnosti.', svc2m:'Výsledok: všetko dôležité v jednom dashboarde a menej manuálnych úkonov.',
        svc3p:'Navrhujeme NAS architektúru, 3-2-1 zálohy, monitoring a test obnovy dát.', svc3m:'Výsledok: bezpečné dáta a jasný recovery postup.',
        svc4p:'Zabezpečujeme priebežnú správu, diagnostiku a optimalizáciu celého IT prostredia.', svc4m:'Výsledok: menej výpadkov, viac predvídateľnosti.',
        galleryTitle:'Interaktívna galéria realizácií', galleryLead:'Každú realizáciu viete rozkliknúť a pozrieť detail: cieľ klienta, návrh, dopad a ďalší postup.',
        want:'Klient chcel', solution:'Navrhli sme', impact:'Zlepšenie',
        p1title:'Realizácia A — Performance Office Setup',
        p1sub:'Modernizácia pracovných staníc pre menší tím.',
        p1want:'zrýchliť workflow, odstrániť sekanie pri multitaskingu, znížiť hluk.',
        p1solution:'nové workstation buildy, airflow tuning, SSD migrácia, stabilitné testy.',
        p1impact:'+42% rýchlosť exportov, nižšia hlučnosť, plynulý multitasking.',
        p1next:'Ďalší podpis: kvartálny performance health-check + preventívny servis.',
        p2title:'Realizácia B — Home Assistant Smart Home',
        p2sub:'Centralizácia smart domácnosti do jedného systému.',
        p2want:'ovládať všetko z jednej appky a mať spoľahlivé automatizácie.',
        p2solution:'Home Assistant core, dashboardy podľa zón, automatizácie scén a alerty.',
        p2impact:'menej ručného ovládania, vyšší komfort a rýchla diagnostika problémov.',
        p2next:'Ďalší podpis: mesačný update automatizácií + rozšírenie nových zariadení.',
        p3title:'Realizácia C — NAS & Data Protection',
        p3sub:'Bezpečné ukladanie a zálohovanie pre domácnosť a malý biznis.',
        p3want:'ochrániť dáta pred stratou a mať jednoduchú obnovu.',
        p3solution:'NAS setup, 3-2-1 backup, offsite sync, pravidelný recovery test.',
        p3impact:'výrazne nižšie riziko straty dát, pripravený postup obnovy.',
        p3next:'Ďalší podpis: monitoring + pravidelný audit backup politiky.',
        casesTitle:'Vybrané úspešné realizácie',
        c1t:'Case #01 — Smart Home centralizácia', c1:'14 zariadení v 5 appkách sme zjednotili do jedného dashboardu a 11 stabilných automatizácií.',
        c2t:'Case #02 — NAS bezpečnosť', c2:'Nasadili sme 3-2-1 architektúru a recovery testy; klient má dnes plne riadené zálohy.',
        c3t:'Case #03 — Office performance', c3:'Po hardvérovom a systémovom tuningu tím pracuje rýchlejšie a s nižším počtom výpadkov.',
        contactTitle:'Kontakt', contactLead:'Kontaktné údaje doplníme po finalizácii brandingu. Systém je pripravený na nasadenie.'
      },
      en: {
        menu:['Home','Services','Gallery','Case studies','Contact'],
        tag:'LUXURY DARK • SMART IT SYSTEMS',
        heroTitle:'We design and deliver IT systems built for long-term reliability.',
        heroLead:'We are your partner for performance, automation and stability: PC, Home Assistant, NAS and ongoing IT care.',
        ctaServices:'Our services', ctaGallery:'Open gallery',
        servicesTitle:'Signature Services', servicesLead:'We use a clear model: what client needs → what we propose → what outcome we deliver.',
        svc1p:'We design, build and optimize PC/workstations for office, gaming and creator workflows.', svc1m:'Outcome: quiet, stable and high-performance systems with clear upgrade roadmap.',
        svc2p:'We implement Home Assistant, integrations and automations for comfort and control.', svc2m:'Outcome: one dashboard for everything that matters and fewer manual actions.',
        svc3p:'We design NAS architecture, 3-2-1 backups, monitoring and recovery testing.', svc3m:'Outcome: secure data and a clear recovery process.',
        svc4p:'We provide ongoing management, diagnostics and optimization of your full IT stack.', svc4m:'Outcome: fewer outages and more predictable operations.',
        galleryTitle:'Interactive project gallery', galleryLead:'Open each project for details: client goals, our proposal, impact and next signature step.',
        want:'Client wanted', solution:'We proposed', impact:'Improvement',
        p1title:'Project A — Performance Office Setup',
        p1sub:'Workstation modernization for a small team.',
        p1want:'faster workflows, no multitasking lag, lower acoustic noise.',
        p1solution:'new workstation builds, airflow tuning, SSD migration, stress tests.',
        p1impact:'+42% faster exports, lower noise, smooth multitasking.',
        p1next:'Next signature: quarterly performance health-check + preventive service.',
        p2title:'Project B — Home Assistant Smart Home',
        p2sub:'Smart home centralization into one reliable system.',
        p2want:'control everything from one app with stable automations.',
        p2solution:'Home Assistant core, zone-based dashboards, scene automations and alerts.',
        p2impact:'fewer manual interactions, higher comfort, faster troubleshooting.',
        p2next:'Next signature: monthly automation updates + new device expansion.',
        p3title:'Project C — NAS & Data Protection',
        p3sub:'Secure storage and backup strategy for home and small business.',
        p3want:'protect critical data and simplify disaster recovery.',
        p3solution:'NAS setup, 3-2-1 backups, offsite sync, regular recovery tests.',
        p3impact:'significantly lower data-loss risk with tested recovery path.',
        p3next:'Next signature: monitoring + recurring backup policy audits.',
        casesTitle:'Selected successful implementations',
        c1t:'Case #01 — Smart Home centralization', c1:'14 devices in 5 apps were unified into one dashboard with 11 stable automations.',
        c2t:'Case #02 — NAS safety', c2:'We deployed 3-2-1 architecture and recovery tests; backups are now fully managed.',
        c3t:'Case #03 — Office performance', c3:'After hardware and system tuning, the team works faster with fewer disruptions.',
        contactTitle:'Contact', contactLead:'Contact details will be added after branding finalization. System is ready for deployment.'
      }
    };

    const drawer = document.getElementById('drawer');
    const overlay = document.getElementById('overlay');
    const burger = document.getElementById('burger');
    const skBtn = document.getElementById('skBtn');
    const enBtn = document.getElementById('enBtn');
    const darkBtn = document.getElementById('darkBtn');
    const lightBtn = document.getElementById('lightBtn');

    let lang = localStorage.getItem('protechtb-lang') || 'sk';
    let theme = localStorage.getItem('protechtb-theme') || 'dark';

    function applyLang() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        el.textContent = i18n[lang][k] || '';
      });
      const menuLinks = drawer.querySelectorAll('a[data-route]');
      menuLinks.forEach((a, i) => a.textContent = i18n[lang].menu[i]);
      skBtn.classList.toggle('active', lang === 'sk');
      enBtn.classList.toggle('active', lang === 'en');
      localStorage.setItem('protechtb-lang', lang);
      document.documentElement.lang = lang;
    }

    function applyTheme() {
      document.body.classList.toggle('light', theme === 'light');
      darkBtn.classList.toggle('active', theme === 'dark');
      lightBtn.classList.toggle('active', theme === 'light');
      localStorage.setItem('protechtb-theme', theme);
    }

    function route() {
      const hash = (location.hash || '#home').replace('#','');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const target = document.getElementById('view-' + hash) || document.getElementById('view-home');
      target.classList.add('active');
      drawer.querySelectorAll('a').forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + hash));
      drawer.classList.remove('open');
      overlay.classList.remove('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    burger.addEventListener('click', () => { drawer.classList.add('open'); overlay.classList.add('show'); });
    overlay.addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('show'); });
    drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('show'); }));

    skBtn.addEventListener('click', () => { lang = 'sk'; applyLang(); });
    enBtn.addEventListener('click', () => { lang = 'en'; applyLang(); });
    darkBtn.addEventListener('click', () => { theme = 'dark'; applyTheme(); });
    lightBtn.addEventListener('click', () => { theme = 'light'; applyTheme(); });

    window.addEventListener('hashchange', route);
    applyLang();
    applyTheme();
    route();
  </script>
</body>
</html>
